project_name: "dnabert2_low_data_promoter"

model_name_or_path: "zhihan1996/DNABERT-2-117M"

# Use one dataset first, then extend.
source_data_dir: "data/raw/GUE/prom/prom_300_all"
low_data_root: "data/low_data/prom_300_all"
output_root: "outputs"

low_data_ratios: [0.01, 0.05, 0.10, 0.25, 1.0]
seeds: [13, 42, 3407]

# Default stable mode (validated on Colab T4).
# Enable "lora_ft" later only after installing compatible peft/accelerate versions.
methods: ["standard_ft"]

training:
  model_max_length: 70
  num_train_epochs: 5
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-5
  warmup_steps: 50
  weight_decay: 0.01
  eval_steps: 200
  save_steps: 200
  logging_steps: 50
  use_fp16: true

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules: "query,value"
